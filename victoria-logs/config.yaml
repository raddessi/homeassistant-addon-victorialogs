name: VictoriaLogs
version: "1.48.0"
slug: victoria_logs
description: The simple, resource-efficient and fast logs database that scales
webui: "http://[HOST]:[PORT:9428]/"
ingress: true
ingress_port: 9428
ingress_entry: select/vmui
# host_network: true
ports:
  9428/tcp: 9428
  9514/tcp: null
  9514/udp: null
ports_description:
  9514/tcp: Extra connection
  9514/udp: Extra connection
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
#  - i386
init: false
map:
  - share:rw
  - ssl
options:
  retention: "99y"
  additionalArguments: ""
  enableHTTPAuth: false
  username: ""
  password: ""
  homeassistantUrl: ""
schema:
  retention: "str?"
  additionalArguments: "str?"
  enableHTTPAuth: bool
  username: "str?"
  password: "password?"
  homeassistantUrl: "str?"
